[build]
builder = "RAILPACK"

[deploy]
preDeployCommand = "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py ensure_default_admin"
startCommand = "gunicorn sidnova_backend.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/health/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
