databases:
  - name: sidnova-postgres
    databaseName: sidnova
    user: sidnova

services:
  - type: web
    name: sidnova-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sidnova-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: sidnova-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py ensure_default_admin && gunicorn sidnova_backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sidnova-postgres
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: sidnova-backend.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://sidnova-backend.onrender.com,https://sidnova-frontend.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://sidnova-frontend.onrender.com
      - key: DJANGO_TIME_ZONE
        value: Asia/Kolkata
      - key: DJANGO_ADMIN_USERNAME
        value: admin
      - key: DJANGO_ADMIN_PASSWORD
        value: Sidnova@2026
